---
apiVersion: v1
kind: Namespace
metadata:
  name: nats-callout-e2e
---
# Allow the callout's anonymous OIDC client to read the cluster's OIDC discovery
# document and JWKS, so it can verify projected service-account tokens.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nats-callout-e2e-oidc-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:service-account-issuer-discovery
subjects:
- kind: Group
  name: system:unauthenticated
  apiGroup: rbac.authorization.k8s.io
