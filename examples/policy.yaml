---
# Authorization policy: ordered rules; the first match wins; no match denies.
#
# Match on the verified identity (provider-neutral):
#   - issuer: restrict the rule to one trusted issuer (recommended for
#     provider-specific rules).
#   - sub: glob (only "*" is special) or "re:"-prefixed anchored regex, matched
#     against the whole subject.
#   - claims: exact match on flattened claims. AWS-namespaced claims are prefixed
#     "aws." (e.g. aws.aws_account, aws.principal_tags.env); GitHub claims are
#     top-level (repository, repository_owner, ref, …).
#
# A rule must carry a "strong" identity pin (an exact sub, a literal AWS account,
# or repository/repository_id/job_workflow_ref) or set allow_broad: true.
#
# For conditions the declarative matchers can't express, a rule may add an
# optional CEL expression (must evaluate to bool), AND-ed with the rest. Its
# variables are sub, iss, aud, claims, exp, now. An expr cannot be statically
# checked for scope, so any rule using it must also set allow_broad: true.
rules:
# GitHub Actions: this repo (any branch/workflow) gets read-only telemetry.
# Pin the repository — repository_owner alone would be "broad". Prefer the
# immutable repository_id where you can, since names can be renamed/transferred.
- name: github-ci
  match:
    issuer: "https://token.actions.githubusercontent.com"
    claims:
      repository: "sylr/nats-jwt-callout"
      # repository_id: "123456789"   # immutable; survives rename/transfer
  grant:
    account: APP
    subscribe:
      allow: ["telemetry.>", "_INBOX.>"]
    publish:
      deny: [">"]

# AWS (STUB): a specific IAM role gets full access to the APP account's app.*
# space. Replace the issuer URL (must match the stub in examples/config.yaml)
# and the ARN/account with your own. Remove this rule if you don't use AWS.
- name: aws-data-role
  match:
    issuer: "https://REPLACE-WITH-YOUR-ACCOUNT.tokens.sts.global.api.aws"
    sub: "arn:aws:iam::000000000000:role/DataProcessingRole"
  grant:
    account: APP
    publish:
      allow: ["app.>"]
    subscribe:
      allow: ["app.>", "_INBOX.>"]
    response:
      max: 1
      ttl: "1m"
    max_expiry: "1h"

# Kubernetes: a specific service account. The exact sub is a strong identity pin,
# so no allow_broad is needed. (Nested claims also work, e.g.
# claims: { kubernetes.io.serviceaccount.name: myapp }.)
- name: k8s-app
  match:
    issuer: "https://REPLACE-WITH-YOUR-CLUSTER-OIDC-ISSUER"
    sub: "system:serviceaccount:myteam:myapp"
  grant:
    account: APP
    publish:
      allow: ["app.>"]
    subscribe:
      allow: ["app.>", "_INBOX.>"]

# Advanced: a CEL expression for dynamic conditions (here: any branch ref in the
# org). Variables: sub, iss, aud, claims, exp, now. Requires allow_broad: true.
- name: github-branches-cel
  match:
    issuer: "https://token.actions.githubusercontent.com"
    expr: 'claims["repository_owner"] == "sylr" && claims["ref"].startsWith("refs/heads/")'
    allow_broad: true
  grant:
    account: APP
    subscribe:
      allow: ["telemetry.>", "_INBOX.>"]
    publish:
      deny: [">"]
