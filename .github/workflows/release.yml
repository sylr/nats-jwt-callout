---
name: Release

on:
  push:
    tags:
    - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v6
      with:
        go-version: stable

    # Multi-arch (linux/amd64+arm64) container builds via dockers_v2 need QEMU
    # for the non-native arch plus a buildx builder.
    - uses: docker/setup-qemu-action@v4
    - uses: docker/setup-buildx-action@v4

    # goreleaser's sboms step shells out to syft, which isn't on the runner.
    - uses: anchore/sbom-action/download-syft@v0

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Run goreleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
