---
name: Release

on:
  push:
    tags:
    - "v*"

permissions:
  contents: write
  packages: write

# goreleaser runs inside the repo's Nix dev shell (nix develop .#ci-release) so
# the release ships with the exact goreleaser/syft/go versions the CI
# goreleaser-check job validated against -- no `latest` drift between checking
# and building the release. Docker (qemu/buildx/login) stays as runner setup.
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
        gc-max-store-size-linux: 1G

    # Multi-arch (linux/amd64+arm64) container builds via dockers_v2 need QEMU
    # for the non-native arch plus a buildx builder.
    - uses: docker/setup-qemu-action@v4
    - uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # goreleaser (and the syft it shells out to for SBOMs) comes from the Nix
    # shell -- same pinned versions as the goreleaser-check CI job.
    - name: Run goreleaser
      run: nix develop .#ci-release --command goreleaser release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish the Helm chart as an OCI artifact to ghcr.io alongside the image.
  # Runs after goreleaser so the chart's appVersion points at an image that has
  # already been pushed. The chart version comes from Chart.yaml (bump it per
  # chart change); appVersion is overridden to the released tag so the published
  # chart pulls the matching image by default.
  helm-chart:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
    - uses: actions/checkout@v7

    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ github.job }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-${{ github.job }}-
        gc-max-store-size-linux: 1G

    - name: Package and push chart to ghcr.io (OCI)
      env:
        GITHUB_REF_NAME: ${{ github.ref_name }}
        REGISTRY_USER: ${{ github.actor }}
        REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OWNER: ${{ github.repository_owner }}
      run: |
        nix develop .#ci-helm --command bash -c '
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "$REGISTRY_TOKEN" | helm registry login ghcr.io -u "$REGISTRY_USER" --password-stdin
          repo="oci://ghcr.io/$OWNER/helm-charts"
          # Each release tag is a unique, immutable chart version (== appVersion).
          # ghcr.io has no tag immutability, so helm push would SILENTLY overwrite
          # an existing version -- guard so a re-run of the same tag is a no-op
          # instead of clobbering published bytes.
          if helm show chart "$repo/nats-oidc-callout" --version "$version" >/dev/null 2>&1; then
            echo "chart nats-oidc-callout $version already published; nothing to push"
            exit 0
          fi
          # Package into a dedicated empty dir and push the exact file helm
          # reports -- never a dist/*.tgz glob, which could match a stray archive.
          # tee the output to a temp file so it still shows in the CI log, then
          # read the path back from that file.
          out="$(mktemp -d)"
          log="$(mktemp)"
          helm package contribs/chart --version "$version" --app-version "$version" -d "$out" | tee "$log"
          pkg="$(sed -n "s/.*saved it to: //p" "$log")"
          test -f "$pkg"
          helm push "$pkg" "$repo"'
