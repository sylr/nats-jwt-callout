apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nats-oidc-callout.fullname" . }}
  labels:
    {{- include "nats-oidc-callout.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nats-oidc-callout.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.restartOnConfigChange }}
        {{- if not .Values.config.existingSecret }}
        checksum/config: {{ toYaml .Values.config.values | sha256sum }}
        {{- end }}
        {{- if and (not .Values.policy.existingConfigMap) (not (empty .Values.policy.values)) }}
        checksum/policy: {{ toYaml .Values.policy.values | sha256sum }}
        {{- end }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nats-oidc-callout.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nats-oidc-callout.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - -config
        - /etc/nats-oidc-callout/config.yaml
        - -log-level
        - {{ .Values.logLevel | quote }}
        {{- with .Values.extraEnv }}
        env:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.metrics.enabled }}
        ports:
        - name: metrics
          containerPort: {{ .Values.metrics.port }}
          protocol: TCP
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          tcpSocket:
            port: metrics
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          tcpSocket:
            port: metrics
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /etc/nats-oidc-callout/config.yaml
          subPath: config.yaml
          readOnly: true
        {{- if include "nats-oidc-callout.policyEnabled" . }}
        - name: policy
          mountPath: /etc/nats-oidc-callout/policy.yaml
          subPath: {{ include "nats-oidc-callout.policyConfigMapKey" . }}
          readOnly: true
        {{- end }}
        {{- with .Values.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
      - name: config
        secret:
          secretName: {{ include "nats-oidc-callout.configSecretName" . }}
          items:
          - key: {{ include "nats-oidc-callout.configSecretKey" . }}
            path: config.yaml
      {{- if include "nats-oidc-callout.policyEnabled" . }}
      - name: policy
        configMap:
          name: {{ include "nats-oidc-callout.policyConfigMapName" . }}
      {{- end }}
      {{- with .Values.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - {{- toYaml . | nindent 10 }}
          {{- if not (hasKey . "labelSelector") }}
          labelSelector:
            matchLabels:
              {{- include "nats-oidc-callout.selectorLabels" $ | nindent 14 }}
          {{- end }}
        {{- end }}
      {{- end }}
