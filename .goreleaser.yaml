---
version: 2

project_name: nats-oidc-callout

before:
  hooks:
  - go mod tidy

builds:
- id: nats-oidc-callout
  main: ./cmd/nats-oidc-callout
  binary: nats-oidc-callout
  env:
  - CGO_ENABLED=0
  flags:
  - -trimpath
  ldflags:
  - -s -w
  - -X main.version=v{{.Version}}
  - -X main.commit={{.Commit}}
  - -X main.date={{.Date}}
  goos:
  - linux
  - darwin
  - windows
  goarch:
  - amd64
  - arm64

archives:
- id: default
  formats: [tar.gz]
  name_template: >-
    {{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}
  format_overrides:
  - goos: windows
    formats: [zip]
  files:
  - README.md
  - LICENSE*
  - examples/*

nfpms:
- id: packages
  package_name: nats-oidc-callout
  # v-prefixed like the archives, but without the OS (deb/rpm are Linux-only).
  # Only the artifact file name carries the "v"; the internal deb/rpm version
  # stays bare so dpkg/rpm compare it correctly.
  file_name_template: >-
    {{ .ProjectName }}_v{{ .Version }}_{{ .Arch }}
  vendor: "Sylvain Rabot"
  homepage: "https://github.com/sylr/nats-oidc-callout"
  maintainer: "Sylvain Rabot <sylvaint@abstraction.fr>"
  description: "NATS auth callout service authenticating clients via OIDC tokens (AWS, GitHub Actions)."
  formats:
  - deb
  - rpm
  bindir: /usr/bin
  contents:
  - src: ./contribs/systemd/nats-oidc-callout.service
    dst: /usr/lib/systemd/system/nats-oidc-callout.service
  - src: ./contribs/systemd/config.yaml
    dst: /etc/nats-oidc-callout/config.yaml
    type: "config|noreplace"
    file_info:
      mode: 0640
      owner: nats-oidc-callout
      group: nats-oidc-callout
  - src: ./examples/policy.yaml
    dst: /etc/nats-oidc-callout/policy.yaml
    type: "config|noreplace"
    file_info:
      mode: 0640
      owner: nats-oidc-callout
      group: nats-oidc-callout
  scripts:
    preinstall: ./contribs/systemd/scripts/preinstall.sh
    postinstall: ./contribs/systemd/scripts/postinstall.sh
    preremove: ./contribs/systemd/scripts/preremove.sh
    postremove: ./contribs/systemd/scripts/postremove.sh

checksum:
  name_template: "checksums.txt"

sboms:
- artifacts: archive

dockers_v2:
- id: nats-oidc-callout
  ids:
  - nats-oidc-callout
  images:
  - "ghcr.io/sylr/nats-oidc-callout"
  tags:
  - "v{{ .Version }}"
  platforms:
  - linux/amd64
  - linux/arm64
  dockerfile: Dockerfile
  labels:
    org.opencontainers.image.source: "https://github.com/sylr/nats-oidc-callout"
    org.opencontainers.image.version: "v{{ .Version }}"
    org.opencontainers.image.revision: "{{ .FullCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
    - "^docs:"
    - "^test:"
    - "^chore:"

release:
  prerelease: auto
